<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Dog Identifier & Diet Planner</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
        background: #000;
    }

    /* Background image with overlay */
    .bg-top {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('/static/images/group_dogs.jpg') no-repeat center center;
        background-size: cover;
        z-index: 0;
    }

    .auth-card {
        background: rgba(255, 255, 255, 0.85);
        border-radius: 20px;
        padding: 35px 30px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        position: relative;
        z-index: 10;
        text-align: center;
    }

    .logo-icon {
        font-size: 30px;
        color: #1a73e8;
        margin-bottom: 10px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 60px;
        height: 60px;
        border: 2px dashed #1a73e8;
        border-radius: 12px;
    }

    .brand-title {
        font-size: 18px;
        font-weight: 700;
        color: #202124;
        line-height: 1.2;
    }

    .brand-title span {
        color: #1a73e8;
        display: block;
    }

    .subtitle {
        margin-top: 15px;
        font-size: 13px;
        color: #5f6368;
        margin-bottom: 20px;
    }

    .subtitle strong {
        color: #202124;
        display: block;
        font-size: 15px;
        margin-bottom: 5px;
    }

    .input-group-custom {
        position: relative;
        margin-bottom: 15px;
    }

    .input-group-custom i.left-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #9aa0a6;
    }

    .input-group-custom input {
        width: 100%;
        padding: 10px 45px 10px 45px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 13px;
        outline: none;
        transition: border-color 0.3s;
    }

    .input-group-custom input:focus {
        border-color: #1a73e8;
    }

    .input-group-custom .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #1a73e8;
        font-size: 16px;
        transition: color 0.2s;
    }

    .input-group-custom .toggle-password:hover {
        color: #1557b0;
    }

    .btn-auth {
        background: #1a73e8;
        color: white;
        border: none;
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        font-weight: 600;
        margin-top: 10px;
        transition: background 0.3s;
    }

    .btn-auth:hover {
        background: #1557b0;
    }

    .login-link {
        display: block;
        margin-top: 20px;
        font-size: 13px;
        color: #5f6368;
    }

    .login-link a {
        color: #1a73e8;
        text-decoration: none;
        font-weight: 600;
    }
</style>
</head>
<body>

<div class="bg-top"></div>

<div class="auth-card">
    <div class="logo-icon">
        <i class="fa-solid fa-paw"></i>
    </div>
    <div class="brand-title">
        Dog Identifier
        <span>& Diet Planner</span>
    </div>

    <div class="subtitle">
        <strong>Create Your Account</strong>
        Join us to identify dog breeds and plan healthy diets
    </div>

    {% if message %}
    <div class="alert alert-danger p-2" style="font-size: 13px;">
        {{ message }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">
        <!-- Full Name -->
        <div class="input-group-custom text-start">
            <i class="fa-regular fa-user left-icon"></i>
            <input 
                type="text" 
                name="username" 
                placeholder="Full Name" 
                pattern="[A-Za-z\s'-]+" 
                title="Only letters, spaces, hyphens (-) and apostrophes (') are allowed" 
                oninput="this.value = this.value.replace(/[^A-Za-z\s'-]/g, '')" 
                required
            >
        </div>

        <!-- Email -->
        <div class="input-group-custom text-start">
            <i class="fa-regular fa-envelope left-icon"></i>
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <!-- Password -->
        <div class="input-group-custom text-start">
            <i class="fa-solid fa-lock left-icon"></i>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <i class="fa-solid fa-eye toggle-password" data-input="password"></i>
        </div>

        <button type="submit" class="btn-auth">Register</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </div>
</div>

<script>
    // Show/hide password
    document.querySelectorAll('.toggle-password').forEach(icon => {
        icon.addEventListener('click', () => {
            const inputId = icon.getAttribute('data-input');
            const inputField = document.getElementById(inputId);
            if (inputField.type === 'password') {
                inputField.type = 'text';
            } else {
                inputField.type = 'password';
            }
            icon.classList.toggle('fa-eye-slash');
        });
    });
</script>

</body>
</html>
