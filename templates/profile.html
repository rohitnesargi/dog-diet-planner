{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="glass-card text-center" style="width: 100%; max-width: 500px; padding: 40px;">
        <h2 class="page-title mb-4">User Profile</h2>

        <div style="background: rgba(255,255,255,0.5); padding: 20px; border-radius: 15px; text-align: left;">
            <p><strong>Username:</strong> {{ user }}</p>
            <p><strong>Status:</strong> Active</p>
            <p><strong>Role:</strong> Standard User</p>
        </div>
        
        <div class="mt-4">
            <a href="{{ url_for('index') }}" class="back-btn" style="margin-top: 0;">⬅ Back to Homepage</a>
        </div>
    </div>
</div>
{% endblock %}
