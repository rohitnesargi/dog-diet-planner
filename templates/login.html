<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Dog Identifier & Diet Planner</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
    }

    .bg-top {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url('/static/images/dogs_field.jpg') no-repeat center center;
        background-size: cover;
        z-index: -1;
    }

    .auth-card {
        background: rgba(255, 255, 255, 0.85);
        border-radius: 20px;
        padding: 40px 30px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        text-align: center;
    }

    .logo-icon {
        font-size: 35px;
        color: #1a73e8;
        margin-bottom: 10px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 70px;
        height: 70px;
        border: 2px dashed #1a73e8;
        border-radius: 15px;
    }

    .brand-title {
        font-size: 20px;
        font-weight: 700;
        color: #202124;
        line-height: 1.2;
    }

    .brand-title span {
        color: #1a73e8;
        display: block;
    }

    .subtitle {
        margin-top: 20px;
        font-size: 14px;
        color: #5f6368;
        margin-bottom: 25px;
    }

    .subtitle strong {
        color: #202124;
        display: block;
        font-size: 16px;
        margin-bottom: 5px;
    }

    .input-group-custom {
        position: relative;
        margin-bottom: 15px;
    }

    .input-group-custom i.left-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #9aa0a6;
    }

    .input-group-custom input {
        width: 100%;
        padding: 12px 45px 12px 45px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
    }

    .input-group-custom input:focus {
        border-color: #1a73e8;
    }

    /* Right side show password icon */
    .input-group-custom .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #1a73e8;
        font-size: 16px;
        transition: color 0.2s;
    }
    .input-group-custom .toggle-password:hover {
        color: #1557b0;
    }

    .btn-auth {
        background: #1a73e8;
        color: white;
        border: none;
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        font-weight: 600;
        transition: background 0.3s;
    }

    .btn-auth:hover {
        background: #1557b0;
    }

    .register-link {
        display: block;
        margin-top: 20px;
        font-size: 13px;
        color: #5f6368;
    }

    .register-link a {
        color: #1a73e8;
        text-decoration: none;
        font-weight: 600;
    }
</style>
</head>
<body>

<div class="bg-top"></div>

<div class="auth-card">
    <div class="logo-icon">
        <i class="fa-solid fa-paw"></i>
    </div>
    <div class="brand-title">
        Dog Identifier
        <span>& Diet Planner</span>
    </div>

    <div class="subtitle">
        <strong>Welcome Back!</strong>
        Login to continue your journey
    </div>

    {% if message %}
    <div class="alert alert-danger p-2" style="font-size: 13px;">
        {{ message }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
        <div class="input-group-custom text-start">
            <i class="fa-regular fa-envelope left-icon"></i>
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-group-custom text-start mb-2">
            <i class="fa-solid fa-lock left-icon"></i>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
        </div>

        <button type="submit" class="btn-auth">Login</button>
    </form>

    <div class="register-link">
        Don't have an account? <a href="{{ url_for('register') }}">Register</a>
        <br>
        <a href="{{ url_for('admin_login') }}" style="color: #999; margin-top: 10px; display: inline-block;">Admin Login</a>
    </div>
</div>

<script>
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');

    togglePassword.addEventListener('click', () => {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        togglePassword.classList.toggle('fa-eye-slash');
    });
</script>

</body>
</html>
